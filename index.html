<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>原则记录器</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f6fa; color: #2d3436; padding: 12px 14px 80px;
      max-width: 650px; margin: 0 auto; line-height: 1.6;
    }
    h1 { text-align: center; font-size: 1.4rem; margin-bottom: 16px; }
    .card {
      background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      padding: 14px; margin-bottom: 12px; border: 1px solid #dfe6e9;
    }
    label { display: block; font-size: 0.75rem; font-weight: 700; color: #636e72; margin-bottom: 3px; }
    input, select, textarea {
      width: 100%; padding: 8px 10px; border: 1px solid #dfe6e9;
      border-radius: 8px; font-size: 0.85rem; margin-bottom: 8px;
      background: #fafafa; color: #2d3436; font-family: inherit;
    }
    textarea { resize: vertical; min-height: 55px; }
    .btn {
      padding: 8px 16px; border: none; border-radius: 8px; font-size: 0.85rem;
      font-weight: 600; cursor: pointer; background: #0984e3; color: #fff; margin-right: 6px;
    }
    .btn-outline { background: transparent; color: #0984e3; border: 2px solid #0984e3; }
    .btn-danger { background: #d63031; }
    .btn-sm { padding: 4px 10px; font-size: 0.7rem; }
    .row { display: flex; flex-wrap: wrap; gap: 8px; }
    .row > div { flex: 1 1 130px; }
    .record-item {
      background: #fff; border-left: 4px solid #0984e3; border-radius: 8px;
      padding: 10px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 10px;
      font-size: 0.65rem; font-weight: 600; background: #e8e8e8; color: #333; margin-right: 4px;
    }
    .filter-bar { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .filter-bar input, .filter-bar select { flex: 1 1 100px; margin-bottom: 0; }
    #emptyMsg { text-align: center; padding: 30px; color: #999; }
  </style>
</head>
<body>

<h1>📋 原则记录器</h1>

<!-- 添加表单 -->
<div class="card">
  <h3 style="margin-bottom:10px;" id="formTitle">➕ 记录新事件</h3>
  <input type="hidden" id="editId">

  <div class="row">
    <div><label>📅 日期</label><input type="date" id="date"></div>
    <div><label>🏷 场景</label><input type="text" id="scene" placeholder="如：职场沟通"></div>
  </div>
  <div class="row">
    <div><label>📌 用途</label><input type="text" id="usage" placeholder="如：冲突处理"></div>
    <div><label>⭐ 重要程度</label>
      <select id="importance">
        <option value="高">🔴 高</option>
        <option value="中" selected>🟡 中</option>
        <option value="低">🟢 低</option>
      </select>
    </div>
  </div>
  <div><label>📝 事件描述</label><textarea id="event" placeholder="发生了什么？"></textarea></div>
  <div class="row">
    <div><label>🔧 解决方法</label><textarea id="solution" placeholder="你怎么处理的？"></textarea></div>
    <div><label>💡 原因 / 原则总结</label><textarea id="principle" placeholder="总结背后的原则……"></textarea></div>
  </div>
  <div style="text-align:right; margin-top:6px;">
    <button class="btn" id="saveBtn">💾 保存记录</button>
    <button class="btn btn-outline" id="cancelBtn" style="display:none;">取消编辑</button>
  </div>
</div>

<!-- 筛选栏 -->
<div class="filter-bar">
  <input type="text" id="searchInput" placeholder="🔍 搜索关键词...">
  <select id="filterScene"><option value="">全部场景</option></select>
  <select id="filterImportance">
    <option value="">全部重要程度</option>
    <option value="高">高</option>
    <option value="中">中</option>
    <option value="低">低</option>
  </select>
  <button class="btn btn-sm btn-outline" id="clearFilterBtn">清除筛选</button>
</div>

<!-- 记录列表容器 -->
<div id="recordList"></div>

<!-- 底部操作 -->
<div class="card" style="text-align:center; margin-top:16px;">
  <button class="btn btn-sm" id="exportBtn">📤 导出备份</button>
  <button class="btn btn-sm btn-outline" id="importBtn">📥 导入恢复</button>
  <input type="file" id="importFile" accept=".json" style="display:none;">
  <p style="font-size:0.65rem; color:#999; margin-top:6px;">数据自动保存在本设备浏览器中</p>
</div>

<script>
(function() {
  'use strict';

  var STORAGE_KEY = 'principles_stable_v1';
  var records = [];
  var editingId = null;

  // ========== 安全获取元素 ==========
  function getEl(id) {
    return document.getElementById(id);
  }

  // ========== 数据加载/保存 ==========
  function loadRecords() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        records = JSON.parse(raw);
        if (!Array.isArray(records)) records = [];
      }
    } catch (e) {
      records = [];
    }
  }
  function saveRecords() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
  }

  // ========== 默认日期 ==========
  function setDefaultDate() {
    var dateEl = getEl('date');
    if (dateEl && !dateEl.value) {
      dateEl.value = new Date().toISOString().split('T')[0];
    }
  }

  // ========== 更新筛选下拉 ==========
  function updateFilterOptions() {
    var sceneSel = getEl('filterScene');
    if (!sceneSel) return;
    var scenes = [];
    records.forEach(function(r) {
      if (r.scene && scenes.indexOf(r.scene) === -1) scenes.push(r.scene);
    });
    scenes.sort();
    var currentVal = sceneSel.value;
    sceneSel.innerHTML = '<option value="">全部场景</option>';
    scenes.forEach(function(s) {
      var opt = document.createElement('option');
      opt.value = s;
      opt.textContent = s;
      sceneSel.appendChild(opt);
    });
    sceneSel.value = currentVal;
  }

  // ========== 渲染记录列表 ==========
  function renderRecordList() {
    var listEl = getEl('recordList');
    if (!listEl) return;

    var searchTerm = (getEl('searchInput').value || '').toLowerCase().trim();
    var sceneFilter = getEl('filterScene').value;
    var impFilter = getEl('filterImportance').value;

    var filtered = records.filter(function(r) {
      if (sceneFilter && r.scene !== sceneFilter) return false;
      if (impFilter && r.importance !== impFilter) return false;
      if (searchTerm) {
        var allText = (r.scene + ' ' + r.usage + ' ' + r.event + ' ' + r.solution + ' ' + r.principle).toLowerCase();
        if (allText.indexOf(searchTerm) === -1) return false;
      }
      return true;
    });

    // 按日期降序
    filtered.sort(function(a, b) {
      if (a.date < b.date) return 1;
      if (a.date > b.date) return -1;
      return 0;
    });

    if (filtered.length === 0) {
      listEl.innerHTML = '<div id="emptyMsg">📭 还没有记录，在上方表单中写一条吧！</div>';
      return;
    }

    var html = '';
    filtered.forEach(function(r) {
      var impBadge = '';
      if (r.importance === '高') impBadge = '<span class="badge" style="background:#ffe1d9;color:#c0392b;">🔴 高</span>';
      else if (r.importance === '低') impBadge = '<span class="badge" style="background:#d5f5e8;color:#008d5e;">🟢 低</span>';
      else impBadge = '<span class="badge" style="background:#fff6e0;color:#b8860b;">🟡 中</span>';

      html += '<div class="record-item">';
      html += '  <div style="font-size:0.75rem; color:#636e72; margin-bottom:4px;">';
      html += '    📅 ' + escapeHtml(r.date) + ' ' + impBadge;
      html += '    <span class="badge">🏷 ' + escapeHtml(r.scene) + '</span>';
      html += '    <span class="badge">📌 ' + escapeHtml(r.usage || '未分类') + '</span>';
      html += '  </div>';
      html += '  <div style="font-weight:600; margin-bottom:4px;">📝 ' + escapeHtml(r.event) + '</div>';
      if (r.solution) html += '  <div style="font-size:0.8rem;">🔧 <strong>解决:</strong> ' + escapeHtml(r.solution) + '</div>';
      if (r.principle) html += '  <div style="font-size:0.8rem;">💡 <strong>原则:</strong> ' + escapeHtml(r.principle) + '</div>';
      html += '  <div style="margin-top:8px;">';
      html += '    <button class="btn btn-sm" onclick="editRecord(\'' + r.id + '\')">✏️ 编辑</button>';
      html += '    <button class="btn btn-sm btn-danger" onclick="deleteRecord(\'' + r.id + '\')">🗑 删除</button>';
      html += '  </div>';
      html += '</div>';
    });
    listEl.innerHTML = html;
  }

  function escapeHtml(text) {
    var div = document.createElement('div');
    div.textContent = text || '';
    return div.innerHTML;
  }

  // ========== 表单操作 ==========
  function resetForm() {
    getEl('editId').value = '';
    setDefaultDate();
    getEl('scene').value = '';
    getEl('usage').value = '';
    getEl('importance').value = '中';
    getEl('event').value = '';
    getEl('solution').value = '';
    getEl('principle').value = '';
    editingId = null;
    getEl('formTitle').textContent = '➕ 记录新事件';
    getEl('saveBtn').textContent = '💾 保存记录';
    getEl('cancelBtn').style.display = 'none';
  }

  function handleSave() {
    var dateEl = getEl('date'); var sceneEl = getEl('scene'); var usageEl = getEl('usage');
    var importanceEl = getEl('importance'); var eventEl = getEl('event');
    var solutionEl = getEl('solution'); var principleEl = getEl('principle');

    if (!dateEl || !sceneEl || !eventEl) return;

    var date = dateEl.value.trim();
    var scene = sceneEl.value.trim();
    var usage = usageEl ? usageEl.value.trim() : '';
    var importance = importanceEl ? importanceEl.value : '中';
    var eventDesc = eventEl.value.trim();
    var solution = solutionEl ? solutionEl.value.trim() : '';
    var principle = principleEl ? principleEl.value.trim() : '';

    if (!date || !scene || !eventDesc) {
      alert('请至少填写：日期、场景和事件描述！');
      return;
    }

    if (editingId) {
      // 更新现有记录
      records.forEach(function(r) {
        if (r.id === editingId) {
          r.date = date;
          r.scene = scene;
          r.usage = usage;
          r.importance = importance;
          r.event = eventDesc;
          r.solution = solution;
          r.principle = principle;
        }
      });
    } else {
      // 新增记录
      records.push({
        id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
        date: date,
        scene: scene,
        usage: usage,
        importance: importance,
        event: eventDesc,
        solution: solution,
        principle: principle
      });
    }

    saveRecords();
    resetForm();
    updateFilterOptions();
    renderRecordList();
  }

  window.editRecord = function(id) {
    var r = null;
    records.forEach(function(item) { if (item.id === id) r = item; });
    if (!r) return;

    editingId = id;
    getEl('editId').value = id;
    getEl('date').value = r.date;
    getEl('scene').value = r.scene;
    getEl('usage').value = r.usage || '';
    getEl('importance').value = r.importance;
    getEl('event').value = r.event;
    getEl('solution').value = r.solution || '';
    getEl('principle').value = r.principle || '';
    getEl('formTitle').textContent = '✏️ 编辑记录';
    getEl('saveBtn').textContent = '💾 更新记录';
    getEl('cancelBtn').style.display = 'inline-block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  window.deleteRecord = function(id) {
    if (!confirm('确定删除这条记录吗？此操作无法撤销！')) return;
    var newRecords = [];
    records.forEach(function(r) {
      if (r.id !== id) newRecords.push(r);
    });
    records = newRecords;
    saveRecords();
    updateFilterOptions();
    renderRecordList();
    if (editingId === id) resetForm();
  };

  // ========== 导出/导入 ==========
  function exportData() {
    var blob = new Blob([JSON.stringify(records, null, 2)], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'principles_backup_' + new Date().toISOString().slice(0,10) + '.json';
    a.click();
    URL.revokeObjectURL(url);
  }

  function importData(file) {
    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var data = JSON.parse(e.target.result);
        if (!Array.isArray(data)) throw new Error('格式错误');
        if (!confirm('即将导入 ' + data.length + ' 条记录，确定合并吗？')) return;
        var idMap = {};
        records.forEach(function(r) { idMap[r.id] = r; });
        data.forEach(function(r) { idMap[r.id] = r; });
        records = Object.values(idMap);
        saveRecords();
        updateFilterOptions();
        renderRecordList();
        alert('导入成功！');
      } catch (err) {
        alert('导入失败：文件格式不正确');
      }
    };
    reader.readAsText(file);
  }

  // ========== 事件绑定 ==========
  function bindEvents() {
    getEl('saveBtn').addEventListener('click', handleSave);
    getEl('cancelBtn').addEventListener('click', resetForm);

    getEl('searchInput').addEventListener('input', renderRecordList);
    getEl('filterScene').addEventListener('change', renderRecordList);
    getEl('filterImportance').addEventListener('change', renderRecordList);
    getEl('clearFilterBtn').addEventListener('click', function() {
      getEl('searchInput').value = '';
      getEl('filterScene').value = '';
      getEl('filterImportance').value = '';
      renderRecordList();
    });

    getEl('exportBtn').addEventListener('click', exportData);
    getEl('importBtn').addEventListener('click', function() {
      getEl('importFile').click();
    });
    getEl('importFile').addEventListener('change', function(e) {
      if (e.target.files[0]) {
        importData(e.target.files[0]);
        e.target.value = '';
      }
    });
  }

  // ========== 启动 ==========
  function init() {
    loadRecords();
    setDefaultDate();
    updateFilterOptions();
    renderRecordList();
    bindEvents();
  }

  // 页面加载完成后执行
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
